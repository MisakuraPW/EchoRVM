experiment:
  name: echonet_rvm_mae
  description: "Single-dataset EchoNet pretraining for EchoRVM-MAE."
  seed: 42
  output_root: /root/autodl-tmp/outputs

data:
  dataset_name: EchoNet-Dynamic
  data_root: /root/autodl-tmp/datasets/EchoNet-Dynamic
  train_split: train
  val_split: val
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  drop_last: true

model:
  name: echo_rmae
  core_type: rvm
  img_size: 112
  patch_size: 8
  frames: 16
  in_chans: 1
  embed_dim: 384
  depth: 12
  num_heads: 6
  decoder_embed_dim: 192
  decoder_depth: 4
  decoder_num_heads: 3
  mask_ratio: 0.75
  core_depth: 2
  drop_path_rate: 0.05

optimizer:
  name: muon_adamw_hybrid
  lr: 1.0e-4
  muon_lr: 1.0e-4
  adamw_lr: 1.0e-4
  weight_decay: 0.05
  muon_momentum: 0.95
  muon_ns_steps: 5

scheduler:
  name: cosine
  warmup_epochs: 10
  min_lr: 1.0e-6

train:
  epochs: 100
  batch_size: 16
  grad_accum_steps: 1
  mixed_precision: true
  channels_last: false
  torch_compile: false
  gradient_checkpointing: false
  clip_grad_norm: 1.0
  log_interval: 20
  val_interval: 1
  plot_interval: 1
  max_steps: null
  stop_on_nan: true

checkpoint:
  resume: null
  auto_resume: true
  save_last: true
  save_best: true
  save_every_n_epochs: 5
  monitor: val_loss
  mode: min

logging:
  use_tqdm: true
  use_tensorboard: true
  save_jsonl: true
  save_csv: true
  save_plots: true

early_stopping:
  enabled: true
  patience: 20
  min_delta: 1.0e-4
