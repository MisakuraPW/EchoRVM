experiment:
  name: mae_debug_ttt
  description: "Smoke test for EchoTTT-MAE."
  seed: 42
  output_root: /root/autodl-tmp/outputs

data:
  dataset_name: synthetic
  num_workers: 0
  pin_memory: true
  drop_last: true

augment:
  enabled: true
  preset: A4_tgc_zoom_speckle
  per_frame_random: false
  img_size: 112
  tgc_prob: 0.4
  gamma_contrast_prob: 0.5
  brightness_prob: 0.3
  zoom_prob: 0.3
  blur_prob: 0.2
  speckle_prob: 0.4
  shadow_prob: 0.0
  tgc_min: 0.75
  tgc_max: 1.35
  gamma_min: 0.75
  gamma_max: 1.35
  contrast_min: 0.85
  contrast_max: 1.20
  brightness_delta: 0.08
  zoom_min: 0.92
  zoom_max: 1.12
  speckle_sigma_min: 0.03
  speckle_sigma_max: 0.10

model:
  name: echo_rmae
  core_type: ttt
  img_size: 112
  patch_size: 8
  frames: 16
  in_chans: 1
  embed_dim: 384
  depth: 2
  num_heads: 6
  decoder_embed_dim: 192
  decoder_depth: 1
  decoder_num_heads: 3
  mask_ratio: 0.75
  core_depth: 1
  ttt_inner_lr: 0.25
  ttt_inner_steps: 1
  drop_path_rate: 0.0
  align_weight: 0.0
  state_smooth_weight: 0.0

optimizer:
  name: muon_adamw_hybrid
  lr: 1.0e-4
  muon_lr: 1.0e-4
  adamw_lr: 1.0e-4
  weight_decay: 0.05

scheduler:
  name: cosine
  warmup_epochs: 1
  min_lr: 1.0e-6

train:
  epochs: 1
  batch_size: 2
  grad_accum_steps: 1
  mixed_precision: true
  channels_last: false
  torch_compile: false
  gradient_checkpointing: false
  clip_grad_norm: 1.0
  log_interval: 1
  val_interval: null
  plot_interval: 1
  max_steps: 20
  stop_on_nan: true

checkpoint:
  resume: null
  auto_resume: false
  save_last: true
  save_best: true
  save_every_n_epochs: 1
  monitor: val_loss
  mode: min

logging:
  use_tqdm: true
  use_tensorboard: true
  save_jsonl: true
  save_csv: true
  save_plots: true

early_stopping:
  enabled: false
  patience: 20
  min_delta: 1.0e-4

debug:
  enabled: true
  max_steps: 20
  overfit_one_batch: false
