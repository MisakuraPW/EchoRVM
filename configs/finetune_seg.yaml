experiment:
  name: seg_finetune_camus_echonet
  description: "Segmentation fine-tuning placeholder for CAMUS and EchoNet."
  seed: 42
  output_root: /root/autodl-tmp/outputs

data:
  datasets:
    - name: CAMUS
      data_root: /root/autodl-tmp/datasets/CAMUS
      enabled: true
    - name: EchoNet-Dynamic
      data_root: /root/autodl-tmp/datasets/EchoNet-Dynamic
      enabled: true
  train_split: train
  val_split: val
  num_workers: 4

model:
  backbone_checkpoint: /root/autodl-tmp/checkpoints/mae_stage1.pt
  img_size: 112
  patch_size: 8
  decoder_depth: 4
  num_classes_camus: 4
  num_classes_echonet: 2

train:
  epochs: 100
  batch_size: 8
  mixed_precision: true
  log_interval: 20
  val_interval: 1

checkpoint:
  auto_resume: true
  monitor: dice
  mode: max
