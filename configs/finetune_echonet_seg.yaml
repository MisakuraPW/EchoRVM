experiment:
  name: echonet_seg_finetune
  seed: 42
  output_root: /root/autodl-tmp/outputs_downstream

data:
  dataset_name: EchoNet-Dynamic
  data_root: /root/autodl-tmp/datasets/EchoNet-Dynamic
  train_split: train
  val_split: val
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  drop_last: true

augment:
  enabled: true
  preset: A4_tgc_zoom_speckle
  per_frame_random: false
  img_size: 112
  tgc_prob: 0.4
  gamma_contrast_prob: 0.5
  brightness_prob: 0.3
  zoom_prob: 0.3
  blur_prob: 0.2
  speckle_prob: 0.4
  shadow_prob: 0.0
  tgc_min: 0.75
  tgc_max: 1.35
  gamma_min: 0.75
  gamma_max: 1.35
  contrast_min: 0.85
  contrast_max: 1.20
  brightness_delta: 0.08
  zoom_min: 0.92
  zoom_max: 1.12
  speckle_sigma_min: 0.03
  speckle_sigma_max: 0.10

model:
  backbone_checkpoint: null
  img_size: 112
  patch_size: 8
  in_chans: 1
  embed_dim: 384
  depth: 12
  num_heads: 6
  core_depth: 2
  num_classes: 2
  head_dropout: 0.10

optimizer:
  name: adamw
  lr: 5.0e-5
  weight_decay: 1.0e-4

scheduler:
  name: cosine
  warmup_epochs: 5
  min_lr: 1.0e-6

train:
  epochs: 80
  batch_size: 16
  grad_accum_steps: 1
  mixed_precision: true
  torch_compile: false
  clip_grad_norm: 1.0
  dice_weight: 1.0
  plot_interval: 1
  max_steps: null
  freeze_backbone: false

checkpoint:
  resume: null
  auto_resume: false
  save_last: true
  save_best: true
  save_every_n_epochs: 5
  monitor: dice_mean
  mode: max

logging:
  use_tqdm: true
  use_tensorboard: true
  save_plots: true

early_stopping:
  enabled: true
  patience: 20
  min_delta: 1.0e-4

