experiment:
  name: ef_finetune_echonet
  description: "EF fine-tuning placeholder for EchoNet-Dynamic."
  seed: 42
  output_root: /root/autodl-tmp/outputs

data:
  dataset_name: EchoNet-Dynamic
  data_root: /root/autodl-tmp/datasets/EchoNet-Dynamic
  train_split: train
  val_split: val
  num_workers: 4

model:
  backbone_checkpoint: /root/autodl-tmp/checkpoints/mae_stage1.pt
  img_size: 112
  patch_size: 8
  frames: 32
  ef_head: edes_query

train:
  epochs: 80
  batch_size: 8
  mixed_precision: true
  log_interval: 20
  val_interval: 1

checkpoint:
  auto_resume: true
  monitor: mae
  mode: min
