experiment:
  name: mae_echonet_camus_pretrain
  description: "Stage-1 recurrent MAE pretraining on EchoNet-Dynamic and CAMUS."
  seed: 42
  output_root: /root/autodl-tmp/outputs

data:
  loader: mixed
  datasets:
    - name: EchoNet-Dynamic
      data_root: /root/autodl-tmp/datasets/EchoNet-Dynamic
      enabled: true
      weight: 1.0
    - name: CAMUS
      data_root: /root/autodl-fs/datasets/CAMUS
      enabled: true
      weight: 1.0
  train_split: train
  val_split: val
  sampler: dataset_balanced
  temperature_alpha: 0.5
  num_workers: 4
  pin_memory: true

augment:
  enabled: true
  preset: A4_tgc_zoom_speckle
  per_frame_random: false
  img_size: 112
  tgc_prob: 0.4
  gamma_contrast_prob: 0.5
  brightness_prob: 0.3
  zoom_prob: 0.3
  blur_prob: 0.2
  speckle_prob: 0.4
  shadow_prob: 0.0
  tgc_min: 0.75
  tgc_max: 1.35
  gamma_min: 0.75
  gamma_max: 1.35
  contrast_min: 0.85
  contrast_max: 1.20
  brightness_delta: 0.08
  zoom_min: 0.92
  zoom_max: 1.12
  speckle_sigma_min: 0.03
  speckle_sigma_max: 0.10

model:
  name: echo_rmae
  core_type: rvm
  img_size: 112
  patch_size: 8
  frames: 16
  in_chans: 1
  embed_dim: 384
  depth: 12
  num_heads: 6
  decoder_embed_dim: 192
  decoder_depth: 4
  decoder_num_heads: 3
  mask_ratio: 0.75
  recurrent_core: rvm
  core_depth: 2
  use_ttt_refine: false
  reconstruction_target: median_blur
  align_weight: 0.0
  state_smooth_weight: 0.0

optimizer:
  name: muon_adamw_hybrid
  lr: 1.0e-4
  muon_lr: 1.0e-4
  adamw_lr: 1.0e-4
  muon_momentum: 0.95
  muon_ns_steps: 5
  weight_decay: 0.05

scheduler:
  name: cosine
  warmup_epochs: 10
  min_lr: 1.0e-6

train:
  epochs: 100
  batch_size: 16
  grad_accum_steps: 1
  mixed_precision: true
  channels_last: false
  torch_compile: false
  gradient_checkpointing: false
  clip_grad_norm: 1.0
  log_interval: 20
  val_interval: 1
  save_interval: 1
  plot_interval: 1
  max_steps: null
  stop_on_nan: true

checkpoint:
  resume: null
  auto_resume: true
  save_last: true
  save_best: true
  save_every_n_epochs: 5
  monitor: val_loss
  mode: min

logging:
  use_tqdm: true
  use_tensorboard: true
  save_jsonl: true
  save_csv: true
  save_plots: true

early_stopping:
  enabled: true
  patience: 20
  min_delta: 1.0e-4
