experiment:
  name: small_mae_screening
  seed: 42
  output_root: /root/autodl-tmp/outputs/aug_validation

data:
  echonet_root: /root/autodl-fs/datasets/EchoNet-Dynamic
  camus_root: /root/autodl-fs/datasets/CAMUS
  train_split: TRAIN
  val_fraction: 0.2
  limit: null

model:
  name: small_mae
  input_size: 112
  num_frames: 8
  base_channels: 32
  mask_ratio: 0.75

train:
  epochs: 5
  batch_size: 64
  num_workers: 16
  prefetch_factor: 4
  persistent_workers: true
  pin_memory: true
  lr: 1.0e-3
  weight_decay: 1.0e-4
  debug_limit: 24
  max_steps: null
